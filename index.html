<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* FUNDO */
body {
    background: #dcdcdc;
}

/* TOPO */
.topbar {
    background: linear-gradient(180deg, #ff2f5b 0%, #1b1b1b 100%);
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto auto;
    gap: 20px;
    align-items: end;
}

.field-group label {
    color: white;
    font-weight: bold;
    margin-bottom: 6px;
    display: block;
}

.field-group input {
    width: 100%;
    height: 38px;
    border-radius: 4px;
    border: none;
    padding: 0 10px;
}

/* BOTÕES TOPO */
.top-btn {
    height: 50px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    color: white;
}

.btn-book {
    background: #3b4257;
}

.btn-tutorial {
    background: #ff2f5b;
}

/* LAYOUT */
.main {
    display: grid;
    grid-template-columns: 1fr 420px;
}

/* ESQUERDA */
.content-left {
    padding: 10px;
}

.crimes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.crime-column {
    background: #e5e5e5;
    padding: 10px;
    border-radius: 4px;
}

/* TITULO DAS SEÇÕES */
.category-title {
    background: #ddd;
    padding: 8px;
    border-radius: 20px;
    text-align: center;
    margin-bottom: 10px;
    font-weight: bold;
}

/* ITEM CRIME */
.crime-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
}

.crime-item span {
    flex: 1;
    margin-left: 6px;
}

/* BOTÃO ? */
.info-btn {
    background: #ff2f5b;
    border: none;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
}

/* SIDEBAR DIREITA */
.sidebar {
    background: linear-gradient(135deg, #1a1824, #20151d);
    color: white;
    padding: 20px;
}

/* TITULO */
.calc-title {
    text-align: center;
    font-size: 26px;
    margin-bottom: 20px;
    font-style: italic;
}

/* INPUTS RESULTADO */
.result-input {
    width: 100%;
    height: 34px;
    margin-bottom: 15px;
    border-radius: 3px;
    border: none;
    background: #eee;
    padding: 0 10px;
}

/* BOTÃO LIMPAR */
.clear-btn {
    width: 100%;
    height: 50px;
    background: #d7113a;
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 3px;
    cursor: pointer;
}

.clear-btn:hover {
    background: #b50d2f;
}

/* BOX */
.box {
    margin-top: 20px;
    border-top: 1px solid #555;
    padding-top: 10px;
}

.selected-crimes {
    width: 100%;
    height: 150px;
    border: none;
    border-radius: 3px;
    padding: 10px;
}
</style><label class="crime-item">
  <input type="checkbox" class="crime" data-pena="5" data-multa="2000" data-nome="6.4 - Tráfico de drogas">
  <span>6.4 - Tráfico de drogas</span>
  <button class="info-btn">?</button>
</label>
<script>
const crimes = document.querySelectorAll('.crime');

function atualizar() {
    let pena = 0;
    let multa = 0;
    let lista = [];

    crimes.forEach(c => {
        if (c.checked) {
            pena += parseInt(c.dataset.pena);
            multa += parseInt(c.dataset.multa);
            lista.push(c.dataset.nome);
        }
    });

    document.getElementById('penaTotal').value = pena + " meses";
    document.getElementById('multaTotal').value = "R$ " + multa.toLocaleString();
    document.getElementById('listaCrimes').value = lista.join("\n");
}

crimes.forEach(c => c.addEventListener('change', atualizar));

function limparTudo() {
    crimes.forEach(c => c.checked = false);
    document.getElementById('penaTotal').value = "";
    document.getElementById('multaTotal').value = "";
    document.getElementById('listaCrimes').value = "";
}
</script>
