<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ULi6 Puzzle PRO MAX</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:2px solid #22c55e;
}

.container {
  display:grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap:15px;
  padding:15px;
}

.card {
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}

/* INVENTARIO */
.item {
  padding:8px;
  margin:5px 0;
}

/* PUZZLE */
.tabuleiro {
  width:300px;
  height:300px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.peca {
  background-size:300px 300px;
  border:1px solid #22c55e;
  cursor:grab;
}

/* BOTÃO */
button {
  padding:10px;
  width:100%;
  margin-top:10px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s;
}
@keyframes glitch {
  0%{transform:translate(2px,-2px);}
  50%{transform:translate(-2px,2px);}
  100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<header>
  <div id="user"></div>
  <div id="cash"></div>
</header>

<div class="container">

  <!-- INVENTARIO -->
  <div class="card">
    <h3>🎒 Inventário</h3>
    <div id="inv"></div>
  </div>

  <!-- PUZZLE -->
  <div class="card">
    <div class="tabuleiro" id="tabuleiro"></div>
    <button onclick="embaralhar()">🔀 Embaralhar</button>
  </div>

  <!-- LOJA -->
  <div class="card">
    <h3>🛒 Loja</h3>
    <button onclick="comprarCaixa()">🎁 Caixa ($500)</button>

    <h3>🏆 Ranking</h3>
    <div id="rank"></div>
  </div>

</div>

<audio id="winSound" src="https://www.myinstants.com/media/sounds/win.mp3"></audio>

<script>
/* LOGIN */
let usuario = localStorage.getItem("user");
if(!usuario){
  usuario = prompt("Digite seu nome:");
  localStorage.setItem("user", usuario);
}
document.getElementById("user").innerText = "👤 " + usuario;

/* CASH */
let dinheiro = parseInt(localStorage.getItem("cash")) || 1000;
function atualizarCash(){
  document.getElementById("cash").innerText = "💰 $" + dinheiro;
}

/* SKINS */
const skins = [
  {nome:"Comum", cor:"#9ca3af", chance:60, img:"https://picsum.photos/id/1011/300"},
  {nome:"Raro", cor:"#3b82f6", chance:25, img:"https://picsum.photos/id/1025/300"},
  {nome:"Épico", cor:"#a855f7", chance:10, img:"https://picsum.photos/id/1005/300"},
  {nome:"Lendário", cor:"#facc15", chance:5, img:"https://picsum.photos/id/1040/300"}
];

/* INVENTARIO */
let inventario = JSON.parse(localStorage.getItem("inv")) || [];

function salvar(){
  localStorage.setItem("inv", JSON.stringify(inventario));
  localStorage.setItem("cash", dinheiro);
}

function renderInventario(){
  const div = document.getElementById("inv");
  div.innerHTML = "";

  inventario.forEach(item=>{
    const el = document.createElement("div");
    el.className = "item";
    el.innerText = item.nome;
    el.style.border = "2px solid " + item.cor;
    el.onclick = ()=>{
      imagemAtual = item;
      iniciar();
    };
    div.appendChild(el);
  });
}

/* LOOT BOX */
function abrirCaixa(){
  let rand = Math.random()*100;
  let soma = 0;

  for(let skin of skins){
    soma += skin.chance;
    if(rand <= soma){
      ganharSkin(skin);
      return;
    }
  }
}

function ganharSkin(skin){
  inventario.push(skin);
  salvar();
  renderInventario();
  alert("🔥 GANHOU: " + skin.nome);
}

/* LOJA */
function comprarCaixa(){
  if(dinheiro >= 500){
    dinheiro -= 500;
    abrirCaixa();
    atualizarCash();
    salvar();
  } else {
    alert("Sem dinheiro!");
  }
}

/* RANKING */
let ranking = JSON.parse(localStorage.getItem("rank")) || [];

function salvarRanking(){
  ranking.push({nome:usuario, score:dinheiro});
  ranking.sort((a,b)=>b.score-a.score);
  localStorage.setItem("rank", JSON.stringify(ranking));
}

function renderRanking(){
  const div = document.getElementById("rank");
  div.innerHTML = "";
  ranking.slice(0,5).forEach(r=>{
    const el = document.createElement("div");
    el.innerText = r.nome + " - $" + r.score;
    div.appendChild(el);
  });
}

/* PUZZLE */
let ordem = [];
let imagemAtual = skins[0];
const tamanho = 3;

function criar(){
  const tab = document.getElementById("tabuleiro");
  tab.innerHTML = "";

  ordem.forEach((pos, index)=>{
    const div = document.createElement("div");
    div.className = "peca";

    const x = pos % tamanho;
    const y = Math.floor(pos / tamanho);

    div.style.backgroundImage = `url(${imagemAtual.img})`;
    div.style.backgroundPosition = `-${x*100}px -${y*100}px`;

    div.draggable = true;

    div.ondragstart = e=>{
      e.dataTransfer.setData("text", index);
    };

    div.ondragover = e=>e.preventDefault();

    div.ondrop = e=>{
      const origem = e.dataTransfer.getData("text");
      trocar(origem, index);
    };

    tab.appendChild(div);
  });
}

function trocar(a,b){
  [ordem[a], ordem[b]] = [ordem[b], ordem[a]];
  criar();
  verificar();
}

function embaralhar(){
  ordem.sort(()=>Math.random()-0.5);
  criar();
}

function verificar(){
  let ok = true;
  ordem.forEach((v,i)=>{
    if(v !== i) ok = false;
  });

  if(ok){
    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"),200);

    document.getElementById("winSound").play();

    dinheiro += 200;
    atualizarCash();

    salvarRanking();
    renderRanking();

    alert("🔥 Puzzle completo! +$200");
  }
}

function iniciar(){
  ordem = [];
  for(let i=0;i<9;i++){
    ordem.push(i);
  }
  embaralhar();
}

/* START */
atualizarCash();
renderInventario();
renderRanking();
iniciar();
</script>

</body>
</html>
