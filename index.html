<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ULi6 CS Puzzle ONLINE PRO</title>

<style>
body { margin:0; font-family:Arial; background:#020617; color:#fff; }

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:2px solid #22c55e;
}

.container {
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:15px;
  padding:15px;
}

.card { background:#0f172a; padding:10px; border-radius:10px; }

.tabuleiro {
  width:300px;
  height:300px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
}

.peca {
  background-size:300px 300px;
  border:1px solid #22c55e;
}

button {
  padding:10px;
  width:100%;
  margin-top:10px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

input {
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<header>
  <div id="user">Carregando...</div>
  <div id="cash">💰 $0</div>
</header>

<div style="padding:10px;">
  <input id="email" placeholder="email">
  <input id="senha" type="password" placeholder="senha">
  <button onclick="registrar()">Criar Conta</button>
  <button onclick="logar()">Entrar</button>
</div>

<div class="container">

  <div class="card">
    <h3>🎒 Inventário</h3>
    <div id="inv"></div>
  </div>

  <div class="card">
    <div class="tabuleiro" id="tabuleiro"></div>
    <button onclick="embaralhar()">🔀 Embaralhar</button>
  </div>

  <div class="card">
    <h3>🏆 Ranking</h3>
    <div id="rank"></div>
  </div>

</div>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4Sz7q23JSoiTZdY56NQAbzrC0_frElck",
  authDomain: "quebra-cabeca-cbd1c.firebaseapp.com",
  projectId: "quebra-cabeca-cbd1c",
  storageBucket: "quebra-cabeca-cbd1c.appspot.com",
  messagingSenderId: "264564370309",
  appId: "1:264564370309:web:addf6bab6948c2493cf2ec"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.registrar = ()=>{
  const email = emailInput.value;
  const senha = senhaInput.value;

  createUserWithEmailAndPassword(auth, email, senha)
    .then(()=>alert("Conta criada!"))
    .catch(e=>alert(e.message));
};

window.logar = ()=>{
  const email = emailInput.value;
  const senha = senhaInput.value;

  signInWithEmailAndPassword(auth, email, senha)
    .then(()=>alert("Logado!"))
    .catch(e=>alert(e.message));
};

/* AUTO LOGIN + LOAD */
let userId = null;

onAuthStateChanged(auth, async (user)=>{
  if(user){
    userId = user.uid;
    document.getElementById("user").innerText = "👤 " + user.email;

    await carregarDados();
    carregarRanking();
  } else {
    document.getElementById("user").innerText = "Não logado";
  }
});

/* DADOS */
let dinheiro = 0;
let inventario = [];

async function salvarDados(){
  if(!userId) return;

  await setDoc(doc(db, "users", userId), {
    dinheiro,
    inventario
  });
}

async function carregarDados(){
  const docRef = doc(db, "users", userId);
  const docSnap = await getDoc(docRef);

  if(docSnap.exists()){
    const data = docSnap.data();
    dinheiro = data.dinheiro || 0;
    inventario = data.inventario || [];
  }

  atualizarUI();
}

function atualizarUI(){
  document.getElementById("cash").innerText = "💰 $" + dinheiro;

  const div = document.getElementById("inv");
  div.innerHTML = "";

  inventario.forEach(i=>{
    div.innerHTML += `<div>${i.nome}</div>`;
  });
}

/* RANKING */
async function salvarScore(){
  await addDoc(collection(db, "ranking"), {
    nome: auth.currentUser.email,
    score: dinheiro
  });
}

async function carregarRanking(){
  const q = query(collection(db, "ranking"), orderBy("score","desc"), limit(10));
  const snapshot = await getDocs(q);

  const div = document.getElementById("rank");
  div.innerHTML = "";

  snapshot.forEach(doc=>{
    const d = doc.data();
    div.innerHTML += `<div>${d.nome} - $${d.score}</div>`;
  });
}

/* JOGO */
const skins = [
  {nome:"AK-47 Redline", img:"https://i.imgur.com/6QKQ8XH.jpg"},
  {nome:"AWP Dragon Lore", img:"https://i.imgur.com/1n9Z1ZQ.jpg"}
];

let imagemAtual = skins[0];
let ordem = [];

function criar(){
  const tab = document.getElementById("tabuleiro");
  tab.innerHTML="";

  ordem.forEach((pos,i)=>{
    const div = document.createElement("div");
    div.className="peca";

    const x = pos%3;
    const y = Math.floor(pos/3);

    div.style.backgroundImage = `url(${imagemAtual.img})`;
    div.style.backgroundPosition = `-${x*100}px -${y*100}px`;

    div.draggable = true;

    div.ondragstart = e=>e.dataTransfer.setData("i", i);

    div.ondrop = e=>{
      const o = e.dataTransfer.getData("i");
      [ordem[i], ordem[o]] = [ordem[o], ordem[i]];
      criar();
      verificar();
    };

    div.ondragover = e=>e.preventDefault();

    tab.appendChild(div);
  });
}

function embaralhar(){
  ordem.sort(()=>Math.random()-0.5);
  criar();
}

function verificar(){
  if(ordem.every((v,i)=>v===i)){
    dinheiro += 200;

    inventario.push(imagemAtual);

    atualizarUI();
    salvarDados();
    salvarScore();

    alert("🔥 Puzzle completo! + item");
  }
}

function iniciar(){
  ordem = [0,1,2,3,4,5,6,7,8];
  embaralhar();
}

/* START */
iniciar();

</script>

</body>
</html>
