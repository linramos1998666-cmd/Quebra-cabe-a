<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora Penal - Alvorada City</title>

<style>
body {
  background: #020617;
  color: #22c55e;
  font-family: monospace;
}

h1 {
  text-align: center;
  text-shadow: 0 0 15px #22c55e;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 0 red; }
  50% { text-shadow: -2px 0 blue; }
  100% { text-shadow: 2px 0 red; }
}

.container {
  max-width: 900px;
  margin: auto;
}

.crime {
  display: flex;
  justify-content: space-between;
  background: #020617;
  border: 1px solid #22c55e;
  padding: 8px;
  margin: 5px;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

textarea {
  width: 100%;
  height: 150px;
}
</style>

</head>

<body>

<h1>MDT - ALVORADA CITY</h1>

<div class="container">

<input id="nome" placeholder="Nome">
<input id="rg" placeholder="RG">

<div id="crimes"></div>

<button onclick="calcular()">Calcular</button> <button onclick="copiar()">Copiar</button> <button onclick="baixarPDF()">Baixar PDF</button>

<h3 id="resultado"></h3>

<textarea id="saida"></textarea>

</div>

const crimes = [
  {cod:"1.1", nome:"Roubo a viatura", tempo:10, multa:10000},
  {cod:"1.2", nome:"Sequestro", tempo:10, multa:2000},
  {cod:"1.3", nome:"Lesão corporal", tempo:3, multa:500},
  {cod:"1.4", nome:"Tráfico de drogas", tempo:8, multa:1500},
  {cod:"1.5", nome:"Porte de arma leve", tempo:5, multa:200}
];

const div = document.getElementById("crimes");

crimes.forEach(c => {
  div.innerHTML += `
    <div class="crime">
      ${c.cod} - ${c.nome}
      <input type="checkbox" data-t="${c.tempo}" data-m="${c.multa}">
    </div>
  `;
});

    m+=+el.dataset.m;
  });

    "Pena: "+t+" meses | Multa: R$"+m;
}
