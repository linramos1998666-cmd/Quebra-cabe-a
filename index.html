<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora Penal - Alvorada City</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  margin: 0;
}

header {
  background: #020617;
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid #22c55e;
}

.container {
  padding: 20px;
}

/* GRID 3 COLUNAS */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* CARD */
.card {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(34,197,94,0.2);
}

.card h3 {
  text-align: center;
  color: #22c55e;
  margin-bottom: 10px;
}

/* CRIMES */
.crime {
  display: flex;
  justify-content: space-between;
  background: #1e293b;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
  font-size: 14px;
}

.crime:hover {
  background: #334155;
}

/* INPUTS */
input {
  border-radius: 6px;
  border: none;
}

/* BOTÃO */
button {
  background: #22c55e;
  border: none;
  padding: 10px 15px;
  color: #000;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
}

/* RESULTADO */
.resultado {
  margin-top: 20px;
  background: #020617;
  padding: 15px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  height: 150px;
  resize: none;
  border-radius: 6px;
  border: none;
}
</style>
</head>

<body>

const container = document.getElementById("crimes");

categorias.forEach((cat, catIndex) => {
  const card = document.createElement("div");
  card.className = "card";

  const titulo = document.createElement("h3");
  titulo.textContent = cat.titulo;
  card.appendChild(titulo);

  cat.crimes.forEach((c, crimeIndex) => {
    const numero = (catIndex + 1) + '.' + (crimeIndex + 1);

    const div = document.createElement("div");
    div.className = "crime";

    div.innerHTML =
      '<span>' + numero + ' - ' + c.nome + '</span>' +
      '<input type="checkbox" data-tempo="' + c.tempo + '" data-multa="' + c.multa + '">';

    card.appendChild(div);
  });

  container.appendChild(card);
});

let crimesSelecionados = [];

function calcular() {
  let tempo = 0;
  let multa = 0;
  crimesSelecionados = [];

  document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
    tempo += parseInt(el.dataset.tempo);
    multa += parseInt(el.dataset.multa);

    const nomeCrime = el.parentElement.querySelector('span').innerText;
    crimesSelecionados.push(nomeCrime);
  });

  document.getElementById('resultado').innerHTML =
    '<p>Tempo: ' + tempo + ' meses</p>' +
    '<p>Multa: R$ ' + multa.toLocaleString() + '</p>';
}

let crimesSelecionados = [];

function atualizarTexto() {
  const nome = document.getElementById('nome').value.trim() || 'N/A';
  const rg = document.getElementById('rg').value.trim() || 'N/A';

  let tempo = 0;
  let multa = 0;
  crimesSelecionados = [];

  document.querySelectorAll('input[type="checkbox"]:checked').forEach(el => {
    tempo += parseInt(el.dataset.tempo);
    multa += parseInt(el.dataset.multa);

    const nomeCrime = el.parentElement.querySelector('span').innerText;
    crimesSelecionados.push(nomeCrime);
  });

  // Atualiza resultado em cima
  document.getElementById('resultado').innerHTML =
    '<p>Tempo: ' + tempo + ' meses</p>' +
    '<p>Multa: R$ ' + multa.toLocaleString() + '</p>';

  // Lista de crimes formatada
  const listaCrimes = crimesSelecionados.length > 0
    ? crimesSelecionados.map((c, i) => (i + 1) + '. ' + c).join('\n')
    : 'Nenhum crime selecionado';

  // TEXTO FINAL AUTOMÁTICO
  const texto =
'```md\n\n' +
'# INFORMAÇÕES DO PRESO:\n' +
'* NOME: ' + nome + '\n' +
'* RG: ' + rg + '\n\n' +
'# PENA TOTAL: ' + tempo + ' meses\n' +
'# MULTA: R$' + multa.toLocaleString() + '\n\n' +
'# CRIMES:\n' +
listaCrimes + '\n\n```';

  document.getElementById('saida').value = texto;
}

// ATUALIZA AUTOMATICAMENTE AO CLICAR NOS CHECKBOX
document.addEventListener('change', function(e) {
  if (e.target.type === 'checkbox') {
    atualizarTexto();
  }
});

// ATUALIZA AO DIGITAR NOME OU RG
document.getElementById('nome').addEventListener('input', atualizarTexto);
document.getElementById('rg').addEventListener('input', atualizarTexto);

// BOTÃO CONTINUA FUNCIONANDO
function calcular() {
  atualizarTexto();
}

function copiarPrisao() {
  atualizarTexto();

  const texto = document.getElementById('saida').value;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(texto).then(() => {
      alert('Prisão copiada!');
    }).catch(() => {
      fallbackCopy(texto);
    });
  } else {
    fallbackCopy(texto);
  }
}

function fallbackCopy(texto) {
  const textarea = document.getElementById('saida');
  textarea.value = texto;
  textarea.select();

  try {
    document.execCommand('copy');
    alert('Copiado (modo antigo)');
  } catch {
    alert('Erro ao copiar');
  }
}
