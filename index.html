<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ULi6 Puzzle PRO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

header {
  padding:20px;
  text-align:center;
  border-bottom:2px solid #22c55e;
}

.container {
  display:grid;
  grid-template-columns: 1fr 2fr;
  gap:20px;
  padding:20px;
}

/* INVENTÁRIO */
.inventario {
  background:#0f172a;
  padding:15px;
  border-radius:10px;
}

.item {
  padding:10px;
  border:1px solid #22c55e;
  margin-bottom:10px;
  cursor:pointer;
  transition:0.2s;
}

.item:hover {
  background:#14532d;
}

/* PUZZLE */
.tabuleiro {
  width:300px;
  height:300px;
  margin:auto;
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:2px;
}

.peca {
  width:100%;
  height:100%;
  background-size:300px 300px;
  border:1px solid #22c55e;
  cursor:grab;
}

/* BOTÕES */
button {
  margin-top:15px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s;
}

@keyframes glitch {
  0% { transform:translate(2px,-2px); }
  50% { transform:translate(-2px,2px); }
  100% { transform:translate(0,0); }
}
</style>
</head>

<body>

<header>
  <h1>🧩 ULi6 Puzzle PRO</h1>
</header>

<div class="container">

  <!-- INVENTÁRIO -->
  <div class="inventario">
    <h3>🎒 Inventário</h3>
    <div id="itens"></div>
  </div>

  <!-- JOGO -->
  <div>
    <div class="tabuleiro" id="tabuleiro"></div>
    <button onclick="embaralhar()">🔀 Embaralhar</button>
  </div>

</div>

<audio id="winSound" src="https://www.myinstants.com/media/sounds/win.mp3"></audio>

<script>
const imagens = [
  {nome:"Skin Vermelha", url:"https://picsum.photos/id/1011/300"},
  {nome:"Skin Azul", url:"https://picsum.photos/id/1025/300"},
  {nome:"Skin Dourada", url:"https://picsum.photos/id/1005/300"}
];

let inventario = JSON.parse(localStorage.getItem("inv")) || [];
let ordem = [];
let imagemAtual = imagens[0];
const tamanho = 3;

function salvar(){
  localStorage.setItem("inv", JSON.stringify(inventario));
}

function atualizarInventario(){
  const div = document.getElementById("itens");
  div.innerHTML = "";

  inventario.forEach(item=>{
    const el = document.createElement("div");
    el.className = "item";
    el.innerText = item.nome;
    el.onclick = ()=>{
      imagemAtual = item;
      iniciar();
    };
    div.appendChild(el);
  });
}

function criar(){
  const tab = document.getElementById("tabuleiro");
  tab.innerHTML = "";

  ordem.forEach((pos, index)=>{
    const div = document.createElement("div");
    div.className = "peca";

    const x = pos % tamanho;
    const y = Math.floor(pos / tamanho);

    div.style.backgroundImage = `url(${imagemAtual.url})`;
    div.style.backgroundPosition = `-${x*100}px -${y*100}px`;

    div.draggable = true;

    div.ondragstart = e=>{
      e.dataTransfer.setData("text", index);
    };

    div.ondragover = e=>e.preventDefault();

    div.ondrop = e=>{
      const origem = e.dataTransfer.getData("text");
      trocar(origem, index);
    };

    tab.appendChild(div);
  });
}

function trocar(a,b){
  [ordem[a], ordem[b]] = [ordem[b], ordem[a]];
  criar();
  verificar();
}

function embaralhar(){
  ordem.sort(()=>Math.random()-0.5);
  criar();
}

function verificar(){
  let ok = true;
  ordem.forEach((v,i)=>{
    if(v !== i) ok = false;
  });

  if(ok){
    document.body.classList.add("glitch");

    setTimeout(()=>{
      document.body.classList.remove("glitch");
    },200);

    document.getElementById("winSound").play();

    const recompensa = imagens[Math.floor(Math.random()*imagens.length)];

    if(!inventario.find(i=>i.nome === recompensa.nome)){
      inventario.push(recompensa);
      salvar();
      atualizarInventario();
      alert("🔥 NOVO ITEM DESBLOQUEADO: " + recompensa.nome);
    } else {
      alert("✔ Puzzle completo!");
    }
  }
}

function iniciar(){
  ordem = [];
  for(let i=0;i<9;i++){
    ordem.push(i);
  }
  embaralhar();
}

atualizarInventario();
iniciar();
</script>

</body>
</html>
