<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Penal - Alvorada City</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #dcdcdc;
}

/* TOPO */
.topbar {
    background: linear-gradient(180deg, #ff2f5b 0%, #1b1b1b 100%);
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto auto;
    gap: 20px;
    align-items: end;
}

.field-group label {
    color: white;
    font-weight: bold;
    margin-bottom: 6px;
    display: block;
}

.field-group input {
    width: 100%;
    height: 38px;
    border-radius: 4px;
    border: none;
    padding: 0 10px;
}

/* BOTÕES TOPO */
.top-btn {
    height: 50px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    color: white;
    font-size: 16px;
}

.btn-book {
    background: #3b4257;
}

.btn-tutorial {
    background: #ff2f5b;
}

/* LAYOUT */
.main {
    display: grid;
    grid-template-columns: 1fr 420px;
}

/* ESQUERDA */
.content-left {
    padding: 10px;
}

.crimes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.crime-column {
    background: #e5e5e5;
    padding: 10px;
    border-radius: 4px;
}

/* TITULO */
.category-title {
    background: #ddd;
    padding: 8px;
    border-radius: 20px;
    text-align: center;
    margin-bottom: 10px;
    font-weight: bold;
}

/* ITEM */
.crime-item {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    font-size: 14px;
}

.crime-item span {
    flex: 1;
    margin-left: 6px;
}

.info-btn {
    background: #ff2f5b;
    border: none;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
}

/* DIREITA */
.sidebar {
    background: linear-gradient(135deg, #1a1824, #20151d);
    color: white;
    padding: 20px;
}

.calc-title {
    text-align: center;
    font-size: 26px;
    margin-bottom: 20px;
    font-style: italic;
}

.result-input {
    width: 100%;
    height: 34px;
    margin-bottom: 15px;
    border-radius: 3px;
    border: none;
    background: #eee;
    padding: 0 10px;
}

.clear-btn {
    width: 100%;
    height: 50px;
    background: #d7113a;
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 3px;
    cursor: pointer;
}

.clear-btn:hover {
    background: #b50d2f;
}

.box {
    margin-top: 20px;
    border-top: 1px solid #555;
    padding-top: 10px;
}

.selected-crimes {
    width: 100%;
    height: 150px;
    border: none;
    border-radius: 3px;
    padding: 10px;
}
</style>
</head>

<body>

<header class="topbar">
    <div class="field-group">
        <label>Nome do Preso</label>
        <input type="text">
    </div>

    <div class="field-group">
        <label>RG do Preso</label>
        <input type="text">
    </div>

    <div class="field-group">
        <label>RG do Advogado</label>
        <input type="text">
    </div>

    <button class="top-btn btn-book">📖</button>
    <button class="top-btn btn-tutorial">Tutorial</button>
</header>

<main class="main">

<!-- ESQUERDA -->
<section class="content-left">
<div class="crimes-grid">

<div class="crime-column">
<div class="category-title">CONTRA A VIDA</div>

<label class="crime-item">
<input type="checkbox" class="crime" data-pena="12" data-multa="5000" data-nome="1.1 - Homicídio">
<span>1.1 - Homicídio</span>
<button class="info-btn">?</button>
</label>

<label class="crime-item">
<input type="checkbox" class="crime" data-pena="6" data-multa="2500" data-nome="1.2 - Lesão corporal">
<span>1.2 - Lesão corporal</span>
<button class="info-btn">?</button>
</label>
</div>

<div class="crime-column">
<div class="category-title">NARCOTRÁFICO</div>

<label class="crime-item">
<input type="checkbox" class="crime" data-pena="4" data-multa="1000" data-nome="6.3 - Posse de Drogas">
<span>6.3 - Posse de Drogas</span>
<button class="info-btn">?</button>
</label>

<label class="crime-item">
<input type="checkbox" class="crime" data-pena="9" data-multa="4500" data-nome="6.4 - Tráfico de drogas">
<span>6.4 - Tráfico de drogas</span>
<button class="info-btn">?</button>
</label>
</div>

<div class="crime-column">
<div class="category-title">TRÂNSITO</div>

<label class="crime-item">
<input type="checkbox" class="crime" data-pena="3" data-multa="700" data-nome="11.1 - Tentativa de Fuga">
<span>11.1 - Tentativa de Fuga</span>
<button class="info-btn">?</button>
</label>

<label class="crime-item">
<input type="checkbox" class="crime" data-pena="5" data-multa="1500" data-nome="11.15 - Sem habilitação">
<span>11.15 - Sem habilitação</span>
<button class="info-btn">?</button>
</label>
</div>

</div>
</section>

<!-- DIREITA -->
<aside class="sidebar">

<h1 class="calc-title">CALCULADORA</h1>

⚖️ PENA:
<input class="result-input" id="penaTotal" readonly>

💸 MULTA:
<input class="result-input" id="multaTotal" readonly>

💰 FIANÇA:
<input class="result-input" id="fiancaTotal" readonly>

<button class="clear-btn" onclick="limpar()">🗑 LIMPAR</button>

<div class="box">
<h3>CRIMES SELECIONADOS</h3>
<textarea class="selected-crimes" id="lista"></textarea>
</div>

</aside>

</main>

<script>
const crimes = document.querySelectorAll('.crime');

function atualizar() {
    let pena = 0;
    let multa = 0;
    let lista = [];

    crimes.forEach(c => {
        if (c.checked) {
            pena += parseInt(c.dataset.pena);
            multa += parseInt(c.dataset.multa);
            lista.push(c.dataset.nome);
        }
    });

    document.getElementById('penaTotal').value = pena + " meses";
    document.getElementById('multaTotal').value = "R$ " + multa.toLocaleString();
    document.getElementById('lista').value = lista.join("\n");
}

crimes.forEach(c => c.addEventListener('change', atualizar));

function limpar() {
    crimes.forEach(c => c.checked = false);
    document.getElementById('penaTotal').value = "";
    document.getElementById('multaTotal').value = "";
    document.getElementById('lista').value = "";
}
</script>

</body>
</html>
