<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ULi6 CS Puzzle</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:2px solid #22c55e;
}

.container {
  display:grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap:15px;
  padding:15px;
}

.card {
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}

.item {
  padding:8px;
  margin:5px 0;
}

.tabuleiro {
  width:300px;
  height:300px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}

.peca {
  background-size:300px 300px;
  border:1px solid #22c55e;
  cursor:grab;
}

button {
  padding:10px;
  width:100%;
  margin-top:10px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* CORES RARIDADE */
.comum { border:2px solid #9ca3af; }
.raro { border:2px solid #3b82f6; }
.epico { border:2px solid #a855f7; }
.lendario { border:2px solid #facc15; }

.glitch {
  animation: glitch 0.2s;
}
@keyframes glitch {
  0%{transform:translate(2px,-2px);}
  50%{transform:translate(-2px,2px);}
  100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<header>
  <div id="user"></div>
  <div id="cash"></div>
</header>

<div class="container">

  <div class="card">
    <h3>🎒 Inventário</h3>
    <div id="inv"></div>
  </div>

  <div class="card">
    <div class="tabuleiro" id="tabuleiro"></div>
    <button onclick="embaralhar()">🔀 Embaralhar</button>
  </div>

  <div class="card">
    <h3>🛒 Loja</h3>
    <button onclick="comprarCaixa()">🎁 Caixa ($500)</button>
  </div>

</div>

<script>

/* LOGIN */
let usuario = localStorage.getItem("user");
if(!usuario){
  usuario = prompt("Digite seu nome:");
  localStorage.setItem("user", usuario);
}
document.getElementById("user").innerText = "👤 " + usuario;

/* CASH */
let dinheiro = parseInt(localStorage.getItem("cash")) || 1000;
function atualizarCash(){
  document.getElementById("cash").innerText = "💰 $" + dinheiro;
}

/* RARIDADE */
const raridades = [
  {nome:"comum", chance:60},
  {nome:"raro", chance:25},
  {nome:"epico", chance:10},
  {nome:"lendario", chance:5}
];

/* SKINS CS (IMAGENS) */
const skinsCS = [
  {nome:"AK-47 Redline", img:"https://i.imgur.com/6QKQ8XH.jpg"},
  {nome:"AWP Dragon Lore", img:"https://i.imgur.com/1n9Z1ZQ.jpg"},
  {nome:"M4A4 Howl", img:"https://i.imgur.com/Y5q9ZQh.jpg"},
  {nome:"Desert Eagle Blaze", img:"https://i.imgur.com/2w7sZ9k.jpg"}
];

let inventario = JSON.parse(localStorage.getItem("inv")) || [];

function salvar(){
  localStorage.setItem("inv", JSON.stringify(inventario));
  localStorage.setItem("cash", dinheiro);
}

function renderInventario(){
  const div = document.getElementById("inv");
  div.innerHTML = "";

  inventario.forEach(item=>{
    const el = document.createElement("div");
    el.className = "item " + item.raridade;
    el.innerText = item.nome + " (" + item.raridade + ")";
    div.appendChild(el);
  });
}

/* SORTEAR RARIDADE */
function sortearRaridade(){
  let rand = Math.random()*100;
  let soma = 0;

  for(let r of raridades){
    soma += r.chance;
    if(rand <= soma){
      return r.nome;
    }
  }
}

/* PUZZLE */
let ordem = [];
let imagemAtual = skinsCS[0];
const tamanho = 3;

function criar(){
  const tab = document.getElementById("tabuleiro");
  tab.innerHTML = "";

  ordem.forEach((pos, index)=>{
    const div = document.createElement("div");
    div.className = "peca";

    const x = pos % tamanho;
    const y = Math.floor(pos / tamanho);

    div.style.backgroundImage = `url(${imagemAtual.img})`;
    div.style.backgroundPosition = `-${x*100}px -${y*100}px`;

    div.draggable = true;

    div.ondragstart = e=>{
      e.dataTransfer.setData("text", index);
    };

    div.ondragover = e=>e.preventDefault();

    div.ondrop = e=>{
      const origem = e.dataTransfer.getData("text");
      trocar(origem, index);
    };

    tab.appendChild(div);
  });
}

function trocar(a,b){
  [ordem[a], ordem[b]] = [ordem[b], ordem[a]];
  criar();
  verificar();
}

function embaralhar(){
  ordem.sort(()=>Math.random()-0.5);
  criar();
}

/* FINAL DO PUZZLE */
function verificar(){
  let ok = true;
  ordem.forEach((v,i)=>{
    if(v !== i) ok = false;
  });

  if(ok){
    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"),200);

    dinheiro += 200;
    atualizarCash();

    let raridade = sortearRaridade();

    let item = {
      nome: imagemAtual.nome,
      img: imagemAtual.img,
      raridade: raridade
    };

    inventario.push(item);

    salvar();
    renderInventario();

    alert("🔥 GANHOU: " + item.nome + " [" + raridade.toUpperCase() + "]");
  }
}

/* CAIXA */
function comprarCaixa(){
  if(dinheiro >= 500){
    dinheiro -= 500;
    imagemAtual = skinsCS[Math.floor(Math.random()*skinsCS.length)];
    iniciar();
    atualizarCash();
  } else {
    alert("Sem dinheiro!");
  }
}

function iniciar(){
  ordem = [];
  for(let i=0;i<9;i++){
    ordem.push(i);
  }
  embaralhar();
}

/* START */
atualizarCash();
renderInventario();
iniciar();

</script>

</body>
</html>
