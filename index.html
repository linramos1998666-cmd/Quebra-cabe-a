<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ULi6 Puzzle Colecionável</title>

<style>
body {
  margin:0;
  background:#020617;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

h1 {
  color:#22c55e;
  margin-top:20px;
}

.tabuleiro {
  width:300px;
  height:300px;
  margin:30px auto;
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:2px;
}

.peca {
  width:100%;
  height:100%;
  background-image:url('https://picsum.photos/300'); /* TROCA AQUI */
  background-size:300px 300px;
  border:1px solid #22c55e;
  cursor:pointer;
}

button {
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🧩 ULi6 Colecionáveis</h1>

<div class="tabuleiro" id="tabuleiro"></div>

<button onclick="embaralhar()">Embaralhar</button>

<script>
const tamanho = 3;
let ordem = [];

function criar(){
  const tabuleiro = document.getElementById("tabuleiro");
  tabuleiro.innerHTML = "";

  ordem.forEach((pos, index)=>{
    const div = document.createElement("div");
    div.className = "peca";

    const x = pos % tamanho;
    const y = Math.floor(pos / tamanho);

    div.style.backgroundPosition = `-${x*100}px -${y*100}px`;

    div.draggable = true;

    div.ondragstart = (e)=>{
      e.dataTransfer.setData("text", index);
    };

    div.ondragover = (e)=> e.preventDefault();

    div.ondrop = (e)=>{
      const origem = e.dataTransfer.getData("text");
      trocar(origem, index);
    };

    tabuleiro.appendChild(div);
  });
}

function trocar(a,b){
  [ordem[a], ordem[b]] = [ordem[b], ordem[a]];
  criar();
  verificar();
}

function embaralhar(){
  ordem.sort(()=>Math.random()-0.5);
  criar();
}

function verificar(){
  let correto = true;
  ordem.forEach((v,i)=>{
    if(v !== i) correto = false;
  });

  if(correto){
    setTimeout(()=>alert("🔥 COMPLETOU O COLECIONÁVEL! 🔥"),100);
  }
}

function iniciar(){
  ordem = [];
  for(let i=0;i<tamanho*tamanho;i++){
    ordem.push(i);
  }
  embaralhar();
}

iniciar();
</script>

</body>
</html>
